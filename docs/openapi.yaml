openapi: 3.0.0

info:
  title: Hospital Vital Monitoring API
  version: 1.0.0
  description: REST API for patients, doctors, and vital signs

paths:
  /api/patients:
    get:
      summary: Fetch all patients
      responses:
        '200':
          description: Successful response

    post:
      summary: Create a patient
      responses:
        '201':
          description: Patient created successfully

  /api/patients/{id}:
    put:
      summary: Update patient

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string

      responses:
        '200':
          description: Patient updated successfully

    delete:
      summary: Delete patient

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string

      responses:
        '200':
          description: Patient deleted successfully
